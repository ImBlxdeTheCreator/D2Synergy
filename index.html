<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guardian Build Synergy Planner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0c0f; --panel:#12161b; --panel2:#171c22; --line:#262d34; --line-soft:#1c2228;
    --text:#e9e7e0; --muted:#8b939c; --muted2:#5c646c; --gold:#d4af37;
    --solar:#ff8c42; --arc:#52d9ff; --void:#b98bff; --stasis:#6fd8ea; --strand:#3ddc84; --kinetic:#c9cdd2;
    --danger:#ff5a5f; --good:#3ddc84;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;}
  h1,h2,h3,.disp{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.04em;}
  .mono{font-family:'JetBrains Mono',monospace;}
  header.top{
    padding:18px 28px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    background:linear-gradient(180deg,#101318,#0a0c0f);
  }
  header.top h1{font-size:20px;margin:0;font-weight:700;letter-spacing:0.08em;color:var(--text);}
  header.top .tag{color:var(--muted);font-size:12px;letter-spacing:0.12em;margin-top:2px;font-family:'Inter';text-transform:none;}
  header.top .reset{
    background:none;border:1px solid var(--line);color:var(--muted);padding:8px 14px;border-radius:2px;
    font-family:'Oswald'; text-transform:uppercase; font-size:12px; letter-spacing:0.08em; cursor:pointer;
  }
  header.top .reset:hover{border-color:var(--gold);color:var(--gold);}

  .layout{display:grid;grid-template-columns:minmax(380px,1fr) minmax(340px,420px);gap:1px;background:var(--line);}
  @media (max-width:900px){.layout{grid-template-columns:1fr;}}
  .col{background:var(--bg);padding:20px;min-width:0;}
  .col.builder{max-height:calc(100vh - 70px);overflow-y:auto;}
  .col.readout{position:sticky; top:0; max-height:calc(100vh - 70px); overflow-y:auto;}

  .panel{
    position:relative; background:var(--panel); border:1px solid var(--line); margin-bottom:14px; padding:14px 16px 16px;
  }
  .panel::before, .panel::after{content:"";position:absolute;width:10px;height:10px;border-color:var(--gold);opacity:0.55;}
  .panel::before{top:-1px;left:-1px;border-top:2px solid var(--gold);border-left:2px solid var(--gold);}
  .panel::after{bottom:-1px;right:-1px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold);}
  .panel h3{font-size:13px;margin:0 0 10px;color:var(--muted);letter-spacing:0.1em;display:flex;align-items:center;gap:8px;}
  .panel h3 .n{color:var(--gold);font-family:'JetBrains Mono';font-size:11px;}

  .row{display:flex;gap:8px;flex-wrap:wrap;}
  select, .pillbtn{
    background:var(--panel2); color:var(--text); border:1px solid var(--line); padding:8px 10px; font-size:13px;
    border-radius:2px; font-family:'Inter'; cursor:pointer;
  }
  select{width:100%;}
  select:focus, .pillbtn:focus{outline:1px solid var(--gold);}

  .chipgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;margin-top:6px;}
  .chip{
    border:1px solid var(--line); background:var(--panel2); padding:8px 10px; font-size:12px; cursor:pointer;
    border-radius:2px; line-height:1.35; transition:border-color .1s, background .1s;
  }
  .chip:hover{border-color:var(--muted);}
  .chip.active{border-color:var(--accent,var(--gold)); background:#1c2128; box-shadow:inset 0 0 0 1px var(--accent,var(--gold));}
  .chip .nm{font-weight:600; display:block; margin-bottom:2px;}
  .chip .desc{color:var(--muted); font-size:11px;}
  .chip.disabled{opacity:0.35; cursor:not-allowed;}

  .subclasstabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
  .subclasstabs button{
    border:1px solid var(--line); background:var(--panel2); color:var(--muted); padding:7px 12px; font-size:12px;
    font-family:'Oswald'; text-transform:uppercase; letter-spacing:0.06em; cursor:pointer; border-radius:2px;
  }
  .subclasstabs button.active{color:#0a0c0f; font-weight:600;}

  .slotrow{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
  .slotrow label{width:78px; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em;}
  .slotrow select{flex:1;}
  .tierpick{display:flex;gap:3px;}
  .tierpick button{
    width:22px;height:22px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);font-size:10px;
    cursor:pointer;border-radius:2px;font-family:'JetBrains Mono';
  }
  .tierpick button.active{background:var(--gold);color:#0a0c0f;border-color:var(--gold);font-weight:700;}

  .modgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;}

  /* readout */
  .barrow{margin-bottom:14px;}
  .barrow .lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;}
  .barrow .lbl .name{color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-size:11px;}
  .barrow .lbl .val{font-family:'JetBrains Mono';font-weight:600;}
  .barrow .val.pos{color:var(--good);} .barrow .val.neg{color:var(--danger);}
  .track{height:8px;background:#1a1f25;border:1px solid var(--line-soft);position:relative;overflow:hidden;}
  .fill{height:100%;background:var(--gold);}
  .sources{margin-top:6px;font-size:11px;color:var(--muted2);}
  .sources div{padding:1px 0;}
  .sources .sv{color:var(--muted);font-family:'JetBrains Mono';}

  .empty-note{color:var(--muted2);font-size:12px;font-style:italic;padding:6px 0;}
  .summarybar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
  .summarybar .sb{background:var(--panel);border:1px solid var(--line);padding:8px 12px;font-size:11px;color:var(--muted);}
  .summarybar .sb b{color:var(--text);display:block;font-size:13px;font-family:'Oswald';letter-spacing:0.05em;}

  ::-webkit-scrollbar{width:9px;} ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--line);} ::-webkit-scrollbar-thumb:hover{background:var(--muted2);}
</style>
</head>
<body>

<header class="top">
  <div>
    <h1>Guardian Build Synergy Planner</h1>
    <div class="tag">personal build theorycrafting &mdash; tiered gear + exotics &mdash; % synergy estimator</div>
  </div>
  <button class="reset" id="resetBtn">Reset Build</button>
</header>

<div class="layout">
  <div class="col builder" id="builderCol"></div>
  <div class="col readout" id="readoutCol"></div>
</div>

   ========================================================================= */

      ],
      aspects:[

// Prismatic aspect/super rosters are curated per-class (a specific subset
// pulled from each source element), matching how Prismatic actually works
// in-game — not an automatic union of everything.
const PRISMATIC_ASPECTS = {
  Titan: [
    {name:"Knockout", element:"Arc", fragSlots:2},
    {name:"Consecration", element:"Solar", fragSlots:2},
    {name:"Unbreakable", element:"Void", fragSlots:2},
    {name:"Diamond Lance", element:"Stasis", fragSlots:2},
    {name:"Drengr's Lash", element:"Strand", fragSlots:2},
  ],
  Hunter: [
    {name:"Ascension", element:"Arc", fragSlots:2},
    {name:"Gunpowder Gamble", element:"Solar", fragSlots:2},
    {name:"Stylish Executioner", element:"Void", fragSlots:2},
    {name:"Winter's Shroud", element:"Stasis", fragSlots:2},
    {name:"Threaded Specter", element:"Strand", fragSlots:2},
  ],
  Warlock: [
    {name:"Lightning Surge", element:"Arc", fragSlots:2},
    {name:"Hellion", element:"Solar", fragSlots:2},
    {name:"Feed the Void", element:"Void", fragSlots:2},
    {name:"Bleak Watcher", element:"Stasis", fragSlots:2},
    {name:"Weaver's Call", element:"Strand", fragSlots:2},
  ],
};

function buildPrismatic(cls){
  const src = SUBCLASSES[cls];
  const supers = [];
  ELEMENTS.filter(e=>e!=="Prismatic").forEach(elem=>{
    src[elem].supers.forEach(s=>supers.push({name:`${s.name} (${elem})`, grants:s.grants, effects:s.effects}));
  });
  const aspects = PRISMATIC_ASPECTS[cls].map(entry=>{
    const a = src[entry.element].aspects.find(x=>x.name===entry.name);
    return {name:`${a.name} (${entry.element})`, grants:a.grants, effects:a.effects, fragSlots:entry.fragSlots};
  });
  return {supers, aspects};
}
["Titan","Hunter","Warlock"].forEach(cls=>{
  SUBCLASSES[cls].Prismatic = buildPrismatic(cls);
});
// shared fragment pool per element (name, grants, effects) — pick up to your
// current fragment-slot cap per build. Prismatic uses its own distinct pool
// ("Facets"), not a mix of the other elements' fragments.
const FRAGMENTS = {
  Arc: [
    {name:"Spark of Amplitude", grants:["amplified"], effects:[{bucket:"meleeEnergy",value:8,cond:"amplified"}]},
    {name:"Spark of Beacons", grants:["jolt"], effects:[{bucket:"classEnergy",value:6,cond:"jolt"}]},
    {name:"Spark of Brilliance", grants:[], effects:[{bucket:"classEnergy",value:6,note:"rapid precision hits"}]},

// Perks that grant a build-relevant verb even when their damage number is
// only a generic estimate (keeps the synergy engine's conditional logic
// meaningful for perks outside the curated library above).
const PERK_GRANT_LIBRARY = {
  "Incandescent":["scorch"], "Voltshot":["jolt"], "Destabilizing Rounds":["volatile"],
  "Repulsor Brace":["overshield"], "Headstone":["frozen"], "Chill Clip":["frozen"],
  "Cold Steel":["frozen"], "Hatchling":["tangle"], "Slice":["sever"], "Dragonfly":[], "Firefly":[],
};

function parsePerkToken(token){
  const m = token.trim().match(/^(.*?)\s*\(([^)]+)\s+Only\)$/);
  if(!m) return {name:token.trim(), lock:null};
  const label = m[2].trim();
  const elementLocks = ["Kinetic","Arc","Solar","Void","Stasis","Strand"];
  return {name:m[1].trim(), lock: elementLocks.includes(label) ? label : "weapon-type"};
}
function perkEffect(name){
  const lib = PERK_EFFECT_LIBRARY[name];
  if(lib) return {...lib};
  return {bucket:"damage", value:4, note:"generic estimate — not individually curated, tune manually"};
}
function buildPerkObj(name){
  return {name, grants: PERK_GRANT_LIBRARY[name]||[], effects:[perkEffect(name)]};
}

const ALL_ELEMENTS_FOR_PERKS = ["Kinetic","Arc","Solar","Void","Stasis","Strand"];
function expandFramePool(raw){
  const byElement = {}; ALL_ELEMENTS_FOR_PERKS.forEach(e=>byElement[e]=[]);
  const neutral = [];
  raw.top.split(",").map(parsePerkToken).forEach(({name,lock})=>{
    if(ALL_ELEMENTS_FOR_PERKS.includes(lock)){
      byElement[lock].push(name);
    } else {
      neutral.push(name);
      byElement.Kinetic.push(name); byElement.Stasis.push(name); byElement.Strand.push(name);
      if(!raw.energyExcludes.includes(name)){
        byElement.Arc.push(name); byElement.Solar.push(name); byElement.Void.push(name);
      }
    }
  });
  if(raw.energyExtra){
    raw.energyExtra.split(",").filter(Boolean).map(parsePerkToken).forEach(({name,lock})=>{
      if(byElement[lock]) byElement[lock].push(name);
    });
  }
  const result = {};
  ALL_ELEMENTS_FOR_PERKS.forEach(e=>{ result[e] = [...new Set(byElement[e])].map(buildPerkObj); });
  return result;
}

const FRAME_PERK_POOLS = {};
Object.keys(FRAME_POOL_RAW).forEach(key=>{ FRAME_PERK_POOLS[key] = expandFramePool(FRAME_POOL_RAW[key]); });

// Real mods split by which armor piece they socket into. Many are pure
// ammo/utility mods (ammo finders, targeting, unflinching, loaders,
// dexterity, reserves) that don't move any of this tool's synergy % buckets —
// those are still listed (so the full roster is here) but marked utility-only
// via `desc` instead of `effects`, rather than faked with invented numbers.
const ELEMENTS_FOR_MODS = ["Harmonic","Kinetic","Arc","Solar","Void","Stasis","Strand"];

function elementalUtilityMods(prefix, descTemplate){
  return ELEMENTS_FOR_MODS.map(e=>({name:`${e} ${prefix}`, grants:[], effects:[], desc:descTemplate(e)}));
}
function elementalWeaponSurge(){
  return ELEMENTS_FOR_MODS.filter(e=>e!=="Harmonic").map(e=>({name:`${e} Weapon Surge`, grants:[], effects:[{bucket:"damage",value:6,cond:"matching-element",note:`${e} weapon damage buff after using class ability`}]}));
}
function elementalSiphon(){
  return ELEMENTS_FOR_MODS.map(e=>({name:`${e} Siphon`, grants:[], effects:[{bucket:"grenadeEnergy",value:4,cond:"matching-element",note:`${e} weapon final blows grant ammo + ability energy`}]}));
}

/* =========================================================================
   STATE
   ========================================================================= */
const state = {
  cls: "Titan",
  element: "Solar",
  super: null, // name of selected super within current subclass
  aspects: [], // names, max 2
  fragments: [], // names, max 3 (represents fragment slot count roughly)
  exoticArmor: null,
  classItemPerks: {col1:null, col2:null}, // Prismatic-only exotic class item perk picks
  armorFilter: "synergy", // "synergy" = only show pieces matching current element + Any; "all" = show everything
  exoticWeaponSlot: {Kinetic:null, Energy:null, Power:null}, // only one exotic weapon equippable at a time really; we allow pick of one
  activeExoticWeapon: null, // name
  legendary: {Kinetic:null, Energy:null, Power:null}, // {name, tier, element, perks:[p1,p2]}
  mods: {Helmet:[], Arms:[], Chest:[], Legs:[], ClassItem:[]}, // up to 4 regular mods per slot
  tuning: {Helmet:null, Arms:null, Chest:null, Legs:null, ClassItem:null}, // one Tier 5 tuning mod per slot
  artifact: null,
  artifactPerks: [], // names, max 5 (T1 all slots, T2 last slots capped implicitly, T3 max 2 enforced)
  armorSet: null, // name of chosen ARMOR_SETS entry
  armorSetPieces: 0, // 0, 2, or 4 — how many pieces of that set are equipped
};

function defaultSuperFor(cls, element){
  const sc = SUBCLASSES[cls][element];
  return sc.supers && sc.supers.length ? sc.supers[0].name : null;
}
state.super = defaultSuperFor(state.cls, state.element);

function resetState(){
  state.cls="Titan"; state.element="Solar"; state.aspects=[]; state.fragments=[];
  state.super = defaultSuperFor(state.cls, state.element);
  state.exoticArmor=null; state.activeExoticWeapon=null; state.armorFilter="synergy";
  state.classItemPerks={col1:null,col2:null};
  state.legendary={Kinetic:null,Energy:null,Power:null};
  state.mods={Helmet:[],Arms:[],Chest:[],Legs:[],ClassItem:[]};
  state.tuning={Helmet:null,Arms:null,Chest:null,Legs:null,ClassItem:null};
  state.artifact=null; state.artifactPerks=[];
  state.armorSet=null; state.armorSetPieces=0;
  render();
}

/* =========================================================================
   ENGINE
   ========================================================================= */
function collectComponents(){
  const comps = [];
  const sc = SUBCLASSES[state.cls][state.element];
  const chosenSuper = (sc.supers||[]).find(s=>s.name===state.super) || (sc.supers||[])[0];
  if(chosenSuper) comps.push({source:`${state.element} Super: ${chosenSuper.name}`, grants:chosenSuper.grants, effects:chosenSuper.effects});
  sc.aspects.forEach(a=>{
    if(state.aspects.includes(a.name)) comps.push({source:`Aspect: ${a.name}`, grants:a.grants, effects:a.effects});
  });
  (FRAGMENTS[state.element]||[]).forEach(f=>{
    if(state.fragments.includes(f.name)) comps.push({source:`Fragment: ${f.name}`, grants:f.grants, effects:f.effects});
  });
  if(state.exoticArmor){
    const ea = EXOTIC_ARMOR[state.cls].find(e=>e.name===state.exoticArmor);
    if(ea){
      if(ea.effects && ea.effects.length) comps.push({source:`Exotic Armor: ${ea.name}`, grants:ea.grants, effects:ea.effects});
      const classItemPool = EXOTIC_CLASS_ITEM_PERKS[state.cls];
      if(classItemPool && ea.name === classItemPool.name){
        const p1 = classItemPool.column1.find(p=>p.name===state.classItemPerks.col1);
        const p2 = classItemPool.column2.find(p=>p.name===state.classItemPerks.col2);
        if(p1) comps.push({source:`${ea.name} — ${p1.name}`, grants:p1.grants, effects:p1.effects});
        if(p2) comps.push({source:`${ea.name} — ${p2.name}`, grants:p2.grants, effects:p2.effects});
      }
    }
  }
  if(state.activeExoticWeapon){
    const ew = EXOTIC_WEAPONS.find(e=>e.name===state.activeExoticWeapon);
    if(ew) comps.push({source:`Exotic Weapon: ${ew.name}`, grants:ew.grants, effects:ew.effects});
  }
  Object.entries(state.legendary).forEach(([slot,val])=>{
    if(!val) return;
    const arch = LEGENDARY_ARCHETYPES.find(a=>a.name===val.name);
    if(!arch) return;
    const tierMult = 1 + (val.tier-1)*WEAPON_TIER_DMG_PER_TIER;
    const perkPool = (FRAME_PERK_POOLS[arch.framePool] && FRAME_PERK_POOLS[arch.framePool][val.element]) || [];
    (val.perks||[]).forEach(perkName=>{
      const perk = perkPool.find(p=>p.name===perkName);
      if(perk){
        const scaledPerk = perk.effects.map(e=>({...e, value: Math.round(e.value*tierMult*10)/10}));
        comps.push({source:`${slot} (T${val.tier}) ${arch.name} [${val.element||'Kinetic'}] — ${perk.name}`, grants:perk.grants, effects:scaledPerk});
      }
    });
  });
  ["Helmet","Arms","Chest","Legs","ClassItem"].forEach(slotName=>{
    (state.mods[slotName]||[]).forEach(modName=>{
      const m = ARMOR_MODS_BY_SLOT[slotName].find(x=>x.name===modName);
      if(m && m.effects && m.effects.length) comps.push({source:`${slotName} Mod: ${m.name}`, grants:m.grants||[], effects:m.effects});
    });
    const tuneName = state.tuning[slotName];
    if(tuneName){
      const t = TUNING_MODS_BY_SLOT[slotName].find(x=>x.name===tuneName);
      if(t) comps.push({source:`${slotName} Tuning: ${t.name}`, grants:[], effects:t.effects});
    }
  });
  if(state.artifact){
    const art = ARTIFACTS.find(a=>a.name===state.artifact);
    if(art){
      art.perks.forEach(p=>{
        if(state.artifactPerks.includes(p.name)) comps.push({source:`Artifact: ${p.name}`, grants:p.grants, effects:p.effects});
      });
    }
  }
  if(state.armorSet && state.armorSetPieces>=2){
    const set = ARMOR_SETS.find(s=>s.name===state.armorSet);
    if(set){
      comps.push({source:`Armor Set (2pc): ${set.twoPiece.name}`, grants:set.twoPiece.grants||[], effects:set.twoPiece.effects});
      if(state.armorSetPieces>=4){
        comps.push({source:`Armor Set (4pc): ${set.fourPiece.name}`, grants:set.fourPiece.grants||[], effects:set.fourPiece.effects});
      }
    }
  }
  return comps;
}

function computeSynergy(){
  const comps = collectComponents();
  const activeTags = new Set();
  comps.forEach(c=>(c.grants||[]).forEach(g=>activeTags.add(g)));
  const totals = {}; BUCKETS.forEach(b=>totals[b.id]=0);
  const contributors = {}; BUCKETS.forEach(b=>contributors[b.id]=[]);
  comps.forEach(c=>{
    (c.effects||[]).forEach(e=>{
      const unlocked = !e.cond || activeTags.has(e.cond);
      if(unlocked){
        totals[e.bucket]+=e.value;
        contributors[e.bucket].push({source:c.source, value:e.value, note:e.note||"", cond:e.cond||null});
      } else {
        contributors[e.bucket].push({source:c.source, value:0, note:(e.note?e.note+" — ":"")+`inactive (needs "${e.cond}" from elsewhere in build)`, cond:e.cond, inactive:true});
      }
    });
  });
  return {totals, contributors, activeTags:[...activeTags]};
}

    if(state.legendary[slot]){
      const arch = LEGENDARY_ARCHETYPES.find(a=>a.name===state.legendary[slot].name);
      const tp = el('div','tierpick');
      tp.style.marginLeft="86px"; tp.style.marginBottom="8px";
      for(let t=1;t<=5;t++){
        const b=document.createElement('button'); b.textContent="T"+t;
        if(state.legendary[slot].tier===t) b.classList.add('active');
        b.onclick=()=>{ state.legendary[slot].tier=t; render(); };
        tp.appendChild(b);
      }
      wrap.appendChild(tp);

      // Element picker (Kinetic slot is always Kinetic-only)
      const elementOptions = slot==="Kinetic" ? ["Kinetic"] : ["Solar","Arc","Void","Stasis","Strand","Kinetic"];
      if(elementOptions.length>1){
        const elRow = el('div','slotrow');
        elRow.style.marginBottom="8px";
        elRow.appendChild(el('label','','Element'));
        const elSel = el('select');
        elementOptions.forEach(elemName=>{
          const o=document.createElement('option'); o.value=elemName; o.textContent=elemName;
          if(state.legendary[slot].element===elemName) o.selected=true;
          elSel.appendChild(o);
        });
        elSel.onchange=()=>{ state.legendary[slot].element = elSel.value; state.legendary[slot].perks=[]; render(); };
        elRow.appendChild(elSel);
        wrap.appendChild(elRow);
      }

      // Perk pool: real per-frame, per-burn pool from FRAME_PERK_POOLS
      const framePool = FRAME_PERK_POOLS[arch.framePool];
      const pool = (framePool && framePool[state.legendary[slot].element]) || [];
      const perkNote = el('div','', '<div style="font-size:11px;color:var(--muted);margin:4px 0 4px;text-transform:uppercase;letter-spacing:.06em;">Perks</div>');
      wrap.appendChild(perkNote);

      const curPerks = state.legendary[slot].perks||[];
      [0,1].forEach(i=>{
        const perkRow = el('div','slotrow');
        perkRow.style.marginBottom='6px';
        perkRow.appendChild(el('label','','Perk '+(i+1)));
        const perkSel = el('select');
        const noneP = document.createElement('option'); noneP.value=""; noneP.textContent="— none —"; perkSel.appendChild(noneP);
        pool.forEach(perk=>{
          const o=document.createElement('option'); o.value=perk.name; o.textContent=perk.name;
          if(curPerks[i]===perk.name) o.selected=true;
          perkSel.appendChild(o);
        });
        perkSel.onchange=()=>{
          const next = (state.legendary[slot].perks||[]).slice();
          while(next.length<2) next.push(null);
          next[i] = perkSel.value || null;
          state.legendary[slot].perks = next;
          render();
        };
        perkRow.appendChild(perkSel);
        wrap.appendChild(perkRow);

        const chosenPerk = pool.find(p=>p.name===curPerks[i]);
        if(chosenPerk){
          const pd = el('div','empty-note', chosenPerk.effects.map(e=>BUCKETS.find(b=>b.id===e.bucket).name+' +'+e.value+'%'+(e.cond?` (if ${e.cond})`:'')+(e.note?' — '+e.note:'')).join(', '));
          pd.style.margin='2px 0 6px'; pd.style.marginLeft='86px';
          wrap.appendChild(pd);
        }
      });
    }
    p4.appendChild(wrap);
  });
  root.appendChild(p4);

  // Armor Mods — one regular mod + one Tier 5 tuning mod per armor slot
  const p5 = el('div','panel');
  p5.appendChild(el('h3','','<span class="n">05</span> Armor Mods <span style="color:var(--muted2);font-family:Inter;text-transform:none;font-size:11px;">(4 mod slots + 1 tuning slot per piece)</span>'));
  const slotDisplayNames = {Helmet:"Helmet", Arms:"Arms", Chest:"Chest", Legs:"Legs", ClassItem:"Class Item"};
  ["Helmet","Arms","Chest","Legs","ClassItem"].forEach(slotName=>{
    const wrap = el('div','');
    wrap.style.marginBottom="14px";
    wrap.style.paddingBottom="10px";
    wrap.style.borderBottom="1px solid var(--line-soft)";
    const chosen = state.mods[slotName]||[];
    wrap.appendChild(el('div','', `<div style="font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;">${slotDisplayNames[slotName]}</div>`));

    for(let i=0;i<4;i++){
      const slotRow = el('div','slotrow');
      slotRow.style.marginBottom="6px";
      slotRow.appendChild(el('label','','Slot '+(i+1)));
      const modSel = el('select');
      const noneOpt = document.createElement('option'); noneOpt.value=""; noneOpt.textContent="— empty —"; modSel.appendChild(noneOpt);
      ARMOR_MODS_BY_SLOT[slotName].forEach(m=>{
        const o=document.createElement('option'); o.value=m.name;
        o.textContent = m.name + (m.effects && m.effects.length ? "" : " (utility)");
        if(chosen[i]===m.name) o.selected=true;
        modSel.appendChild(o);
      });
      modSel.onchange=()=>{
        const cur = (state.mods[slotName]||[]).slice();
        while(cur.length<4) cur.push(null);
        cur[i] = modSel.value || null;
        state.mods[slotName] = cur;
        render();
      };
      slotRow.appendChild(modSel);
      wrap.appendChild(slotRow);

      const chosenMod = ARMOR_MODS_BY_SLOT[slotName].find(m=>m.name===chosen[i]);
      if(chosenMod){
        const desc = chosenMod.effects && chosenMod.effects.length
          ? chosenMod.effects.map(e=>BUCKETS.find(b=>b.id===e.bucket).name+' '+(e.value>=0?'+':'')+e.value+'%'+(e.cond?` (if ${e.cond})`:'')).join(', ')
          : (chosenMod.desc||'utility only');
        const note = el('div','empty-note', desc);
        note.style.margin="2px 0 6px"; note.style.marginLeft="86px";
        wrap.appendChild(note);
      }
    }

    const tuneSel = el('select');
    tuneSel.style.marginTop="8px";
    const noneTuneOpt = document.createElement('option'); noneTuneOpt.value=""; noneTuneOpt.textContent="— no Tier 5 tuning —"; tuneSel.appendChild(noneTuneOpt);
    TUNING_MODS_BY_SLOT[slotName].forEach(t=>{
      const o=document.createElement('option'); o.value=t.name; o.textContent=t.name;
      if(state.tuning[slotName]===t.name) o.selected=true;
      tuneSel.appendChild(o);
    });
    tuneSel.onchange=()=>{ state.tuning[slotName] = tuneSel.value || null; render(); };
    wrap.appendChild(tuneSel);

    const chosenTune = TUNING_MODS_BY_SLOT[slotName].find(t=>t.name===state.tuning[slotName]);
    if(chosenTune){
      const tdesc = chosenTune.effects.map(e=>BUCKETS.find(b=>b.id===e.bucket).name+' '+(e.value>=0?'+':'')+e.value+'%').join(', ');
      const tnote = el('div','empty-note', tdesc);
      tnote.style.margin="4px 0 0";
      wrap.appendChild(tnote);
    }

    p5.appendChild(wrap);
  });
  root.appendChild(p5);

  // Artifact
  const p6 = el('div','panel');
  p6.appendChild(el('h3','','<span class="n">06</span> Seasonal Artifact'));
  const artSel = el('select');
  const noneOpt2=document.createElement('option'); noneOpt2.value=""; noneOpt2.textContent="— none —"; artSel.appendChild(noneOpt2);
  ARTIFACTS.forEach(a=>{
    const o=document.createElement('option'); o.value=a.name; o.textContent=a.name+" — "+a.theme;
    if(state.artifact===a.name) o.selected=true;
    artSel.appendChild(o);
  });
  artSel.onchange=()=>{ state.artifact = artSel.value||null; state.artifactPerks=[]; render(); };
  p6.appendChild(artSel);
  if(state.artifact){
    const art = ARTIFACTS.find(a=>a.name===state.artifact);
    const note = el('div','empty-note', 'T1: up to 7 slots · T2: last 5 slots · T3: max 2 active — pick freely below (not slot-enforced, for estimation only)');
    note.style.margin="8px 0"; p6.appendChild(note);
    const pg = el('div','chipgrid');
    art.perks.forEach(p=>{
      const active = state.artifactPerks.includes(p.name);
      const t3count = state.artifactPerks.filter(name=>art.perks.find(pp=>pp.name===name && pp.tier===3)).length;
      const disabled = !active && p.tier===3 && t3count>=2;
      const chip = el('div','chip'+(active?' active':'')+(disabled?' disabled':''), `<span class="nm">${p.name} <span style="color:var(--muted2);">T${p.tier}</span></span><span class="desc">${p.effects.map(e=>BUCKETS.find(b=>b.id===e.bucket).name+' +'+e.value+'%'+(e.cond?` (if ${e.cond})`:'')).join(', ')}</span>`);
      chip.onclick=()=>{
        if(disabled) return;
        if(active){ state.artifactPerks=state.artifactPerks.filter(x=>x!==p.name); }
        else { state.artifactPerks.push(p.name); }
        render();
      };
      pg.appendChild(chip);
    });
    p6.appendChild(pg);
  }
  root.appendChild(p6);

  // Armor Set Bonus
  const p7 = el('div','panel');
  p7.appendChild(el('h3','','<span class="n">07</span> Legendary Armor Set Bonus'));
  const setSel = el('select');
  const noneSetOpt = document.createElement('option'); noneSetOpt.value=""; noneSetOpt.textContent="— none —"; setSel.appendChild(noneSetOpt);
  ARMOR_SETS.forEach(s=>{
    const o=document.createElement('option'); o.value=s.name; o.textContent=`${s.name} (${s.category})`;
    if(state.armorSet===s.name) o.selected=true;
    setSel.appendChild(o);
  });
  setSel.onchange=()=>{ state.armorSet = setSel.value || null; state.armorSetPieces = setSel.value ? 2 : 0; render(); };
  p7.appendChild(setSel);
  if(state.armorSet){
    const set = ARMOR_SETS.find(s=>s.name===state.armorSet);
    const pieceRow = el('div','tierpick');
    pieceRow.style.margin="8px 0";
    [2,4].forEach(n=>{
      const b=document.createElement('button'); b.textContent=n+"pc"; b.style.width="auto"; b.style.padding="4px 10px";
      if(state.armorSetPieces===n) b.classList.add('active');
      b.onclick=()=>{ state.armorSetPieces=n; render(); };
      pieceRow.appendChild(b);
    });
    p7.appendChild(pieceRow);
    const desc = el('div','empty-note',
      `<b style="color:var(--text);font-style:normal;">${set.twoPiece.name} (2pc):</b> ${set.twoPiece.effects.map(e=>BUCKETS.find(b=>b.id===e.bucket).name+' +'+e.value+'%').join(', ')}${set.twoPiece.effects[0].note?' — '+set.twoPiece.effects[0].note:''}<br>`+
      `<b style="color:${state.armorSetPieces>=4?'var(--text)':'var(--muted2)'};font-style:normal;">${set.fourPiece.name} (4pc):</b> ${set.fourPiece.effects.map(e=>BUCKETS.find(b=>b.id===e.bucket).name+' +'+e.value+'%').join(', ')}${set.fourPiece.effects[0].note?' — '+set.fourPiece.effects[0].note:''}`
    );
    desc.style.marginTop='6px';
    p7.appendChild(desc);
    const tradeoff = el('div','empty-note', `Running ${state.armorSetPieces} set pieces means ${state.armorSetPieces} of your 5 armor slots aren't independent Exotic/high-stat rolls — that's the tradeoff for the bonus above.`);
    tradeoff.style.marginTop='6px';
    p7.appendChild(tradeoff);
  }
  root.appendChild(p7);
}

/* =========================================================================
   RENDER — READOUT (right column)
   ========================================================================= */
function renderReadout(){
  const root = document.getElementById('readoutCol');
  root.innerHTML = "";
  const {totals, contributors, activeTags} = computeSynergy();

  const summary = el('div','summarybar');
  summary.appendChild(el('div','sb', `<b style="color:${ELEMENT_COLOR[state.element]}">${state.cls}</b>${state.element}`));
  summary.appendChild(el('div','sb', `<b>${state.activeExoticWeapon||'—'}</b>Exotic Weapon`));
  summary.appendChild(el('div','sb', `<b>${state.exoticArmor||'—'}</b>Exotic Armor`));
  summary.appendChild(el('div','sb', `<b>${activeTags.length}</b>Active Verbs`));
  root.appendChild(summary);

  if(activeTags.length){
    const tagPanel = el('div','panel');
    tagPanel.appendChild(el('h3','','Active Build Verbs'));
    tagPanel.appendChild(el('div','', activeTags.map(t=>`<span class="mono" style="display:inline-block;background:var(--panel2);border:1px solid var(--line);padding:3px 8px;margin:2px;font-size:11px;border-radius:2px;">${t}</span>`).join('')));
    root.appendChild(tagPanel);
  }

  const maxAbs = Math.max(1, ...BUCKETS.map(b=>Math.abs(totals[b.id])));
  BUCKETS.forEach(b=>{
    const val = Math.round(totals[b.id]*10)/10;
    const panel = el('div','panel');
    const row = el('div','barrow');
    const lbl = el('div','lbl', `<span class="name">${b.name}</span><span class="val ${val>=0?'pos':'neg'} mono">${val>=0?'+':''}${val}%</span>`);
    row.appendChild(lbl);
    const track = el('div','track');
    const fill = el('div','fill');
    fill.style.width = Math.min(100, Math.abs(val)/maxAbs*100)+"%";
    if(val<0) fill.style.background="var(--danger)";
    track.appendChild(fill);
    row.appendChild(track);

    const contribs = contributors[b.id].filter(c=>!c.inactive);
    const inactives = contributors[b.id].filter(c=>c.inactive);
    if(contribs.length || inactives.length){
      const srcBox = el('div','sources');
      contribs.forEach(c=>{
        srcBox.appendChild(el('div','', `<span class="sv">+${c.value}%</span> ${c.source}${c.note?' — '+c.note:''}`));
      });
      inactives.forEach(c=>{
        const d = el('div','', `<span class="sv" style="color:var(--muted2);">+0%</span> ${c.source} — ${c.note}`);
        d.style.opacity="0.55";
        srcBox.appendChild(d);
      });
      row.appendChild(srcBox);
    } else {
      row.appendChild(el('div','empty-note','No sources selected yet.'));
    }
    panel.appendChild(row);
    root.appendChild(panel);
  });

  const disclaimer = el('div','empty-note', 'Percentages are relative synergy estimates for build comparison — not verbatim in-game combat log numbers. Edit the DATA objects in this file to add weapons, mods, or artifacts as the sandbox evolves.');
  disclaimer.style.padding="10px 4px 20px";
  root.appendChild(disclaimer);
}

function render(){
  renderBuilder();
  renderReadout();
}

document.getElementById('resetBtn').onclick = resetState;
render();
</script>
</body>
